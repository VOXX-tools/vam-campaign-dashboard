name: Fetch Campaign Data

on:
  # スケジュール実行は一時的に無効化（サービスアカウント設定完了後に有効化）
  # schedule:
  #   - cron: '5 * * * *'
  workflow_dispatch:  # 手動実行のみ

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel API to fetch and save data
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST https://vam-campaign-dashboard.vercel.app/api/cron-fetch \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "Error: API call failed with status $http_code"
            exit 1
          fi
          
          echo "✅ Data fetched and saved successfully"
