name: Fetch Campaign Data

on:
  # スケジュール実行を無効化
  # schedule:
  #   - cron: '56 * * * *'
  workflow_dispatch:  # 手動実行のみ

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and save campaign data
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          VITE_SPREADSHEET_ID: "1IwAuWxaQq2joBxNsGyCMnlvLN29ADqconyqXWoSepmA"
          VITE_SHEET_NAME: "進捗率タブ"
          FIREBASE_PROJECT_ID: "vam-campaign-dashboard"
        run: node scripts/fetch-and-save.mjs
